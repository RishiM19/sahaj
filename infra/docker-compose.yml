name: sahaj

services:
  neo4j:
    image: neo4j:5.24-community
    ports:
      - "7474:7474" # browser UI
      - "7687:7687" # bolt
    environment:
      NEO4J_AUTH: neo4j/sahaj_dev_pw
      NEO4J_PLUGINS: '[]'
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  mongo:
    image: mongo:7.0
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7.4-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  qdrant:
    image: qdrant/qdrant:v1.11.5
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/127.0.0.1/6333' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: sahaj
      POSTGRES_PASSWORD: sahaj_dev_pw
      POSTGRES_DB: sahaj_cfti
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sahaj"]
      interval: 10s
      timeout: 5s
      retries: 10

  # Ollama is deliberately NOT a service here. On macOS, run it natively
  # (`brew install ollama && brew services start ollama`) so it gets Metal
  # acceleration and isn't boxed into Docker Desktop's small default VM
  # memory limit, which was crashing phi3:mini mid-generation. On a Linux
  # host with enough RAM allocated to Docker, uncomment this to containerize
  # it too - everything else in this compose file already talks to
  # localhost:11434, so nothing else changes.
  #
  # ollama:
  #   image: ollama/ollama:latest
  #   ports:
  #     - "11434:11434"
  #   volumes:
  #     - ollama_data:/root/.ollama

volumes:
  neo4j_data:
  mongo_data:
  redis_data:
  qdrant_data:
  postgres_data:
