apiVersion: apps/v1
kind: Deployment
metadata:
  name: opensearch
  namespace: sahaj
spec:
  replicas: 1
  selector:
    matchLabels: { app: opensearch }
  template:
    metadata:
      labels: { app: opensearch }
    spec:
      containers:
        - name: opensearch
          image: opensearchproject/opensearch:2.17.1
          env:
            - { name: discovery.type, value: "single-node" }
            - { name: DISABLE_SECURITY_PLUGIN, value: "true" }
            - { name: DISABLE_INSTALL_DEMO_CONFIG, value: "true" }
            - { name: OPENSEARCH_JAVA_OPTS, value: "-Xms512m -Xmx512m" }
          ports:
            - containerPort: 9200
          readinessProbe:
            tcpSocket: { port: 9200 }
            initialDelaySeconds: 30
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: opensearch
  namespace: sahaj
spec:
  selector: { app: opensearch }
  ports:
    - { port: 9200, targetPort: 9200 }
