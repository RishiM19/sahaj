apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: qdrant-data
  namespace: sahaj
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: qdrant
  namespace: sahaj
spec:
  replicas: 1
  selector:
    matchLabels: { app: qdrant }
  template:
    metadata:
      labels: { app: qdrant }
    spec:
      containers:
        - name: qdrant
          image: qdrant/qdrant:v1.11.5
          ports:
            - containerPort: 6333
          volumeMounts:
            - { name: data, mountPath: /qdrant/storage }
          readinessProbe:
            tcpSocket: { port: 6333 }
            initialDelaySeconds: 10
            periodSeconds: 5
      volumes:
        - name: data
          persistentVolumeClaim: { claimName: qdrant-data }
---
apiVersion: v1
kind: Service
metadata:
  name: qdrant
  namespace: sahaj
spec:
  selector: { app: qdrant }
  ports:
    - { port: 6333, targetPort: 6333 }
