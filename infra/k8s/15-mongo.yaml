apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongo
  namespace: sahaj
spec:
  replicas: 1
  selector:
    matchLabels: { app: mongo }
  template:
    metadata:
      labels: { app: mongo }
    spec:
      containers:
        - name: mongo
          image: mongo:7.0
          ports:
            - containerPort: 27017
          readinessProbe:
            tcpSocket: { port: 27017 }
            initialDelaySeconds: 10
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: mongo
  namespace: sahaj
spec:
  selector: { app: mongo }
  ports:
    - { port: 27017, targetPort: 27017 }
