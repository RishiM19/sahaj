apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: sahaj
spec:
  replicas: 1
  selector:
    matchLabels: { app: frontend }
  template:
    metadata:
      labels: { app: frontend }
    spec:
      containers:
        - name: frontend
          image: sahaj-frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
          readinessProbe:
            tcpSocket: { port: 80 }
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: sahaj
spec:
  selector: { app: frontend }
  ports:
    - { port: 80, targetPort: 80 }
