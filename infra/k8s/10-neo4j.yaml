apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: neo4j-data
  namespace: sahaj
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: neo4j
  namespace: sahaj
spec:
  replicas: 1
  selector:
    matchLabels: { app: neo4j }
  template:
    metadata:
      labels: { app: neo4j }
    spec:
      containers:
        - name: neo4j
          image: neo4j:5.24-community
          env:
            - { name: NEO4J_AUTH, value: "neo4j/sahaj_dev_pw" }
          ports:
            - containerPort: 7687
            - containerPort: 7474
          volumeMounts:
            - { name: data, mountPath: /data }
          readinessProbe:
            tcpSocket: { port: 7687 }
            initialDelaySeconds: 20
            periodSeconds: 5
      volumes:
        - name: data
          persistentVolumeClaim: { claimName: neo4j-data }
---
apiVersion: v1
kind: Service
metadata:
  name: neo4j
  namespace: sahaj
spec:
  selector: { app: neo4j }
  ports:
    - { name: bolt, port: 7687, targetPort: 7687 }
    - { name: http, port: 7474, targetPort: 7474 }
